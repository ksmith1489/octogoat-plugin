<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">OctoGOAT hero art</title>
  <desc id="desc">OctoGOAT logo with a dancing taco, a small goat, and a speech bubble.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#041353"/>
      <stop offset="55%" stop-color="#08329f"/>
      <stop offset="100%" stop-color="#0d1e69"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
